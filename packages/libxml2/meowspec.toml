sha256      = ""  # fill in after: sha256sum $(basename https://download.gnome.org/sources/libxml2/2.12/libxml2-2.12.6.tar.xz)

depends = [
  "musl",
  "zlib",
  "xz",
]
build_depends = [
  "gcc",
  "make",
  "python",
]
provides  = []
conflicts = []
