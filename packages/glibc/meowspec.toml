[package]
name        = "glibc"
version     = "2.42"
release     = 1
summary     = "The GNU C Library — the core C runtime for Linux systems"
license     = "LGPL-2.1"
source_url  = "https://mirror.dogado.de/gnu/glibc/glibc-2.42.tar.xz"
sha256      = "d1775e32e4628e64ef930f435b67bb63af7599acb6be2b335b9f19f16509f17f"

depends       = ["linux-headers"]
build_depends = ["gcc", "make", "bison", "python3", "gawk", "sed", "texinfo", "linux-headers"]

provides      = [
  "libc",
  "libm",
  "libpthread",
  "libdl",
  "librt",
  "libresolv",
  "libnsl",
  "libutil",
  "libnss_files",
  "libnss_dns",
  "ld-linux",
]

conflicts     = ["musl"]

[options]
# Build in a separate build directory as required by glibc
out_of_tree   = true
