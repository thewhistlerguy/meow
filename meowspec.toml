# meowspec.toml — package spec for re-pisi/meow
# Example: bash

[package]
name        = "bash"
version     = "5.2.21"
release     = 1
summary     = "The GNU Bourne Again shell"
description = """
Bash is the GNU Project's Bourne Again SHell, a complete implementation
of the POSIX shell spec with interactive command line editing, job control,
functions, arrays, and more.
"""
license     = "GPL-3.0"
homepage    = "https://www.gnu.org/software/bash/"
arch        = "x86_64"
source_url  = "https://ftp.gnu.org/gnu/bash/bash-5.2.21.tar.gz"
sha256      = "c8e31bdc59b69aaffc5b36509905ba3e5d464c58f23e9670b85c4a9f2accc98b"

depends       = ["glibc", "readline", "ncurses"]
build_depends = ["gcc", "make", "readline-dev", "ncurses-dev"]
provides      = ["sh"]
conflicts     = []
